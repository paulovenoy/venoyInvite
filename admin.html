<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Aniversário</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💜</text></svg>">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Lora:ital@1&display=swap');

        body { font-family: 'Poppins', sans-serif; background-color: #2B0D46; color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .admin-container { background: white; padding: 2rem; border-radius: 15px; width: 100%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #5E2C85; text-align: center; margin-bottom: 1.5rem; }

        /* Estilos da Tela de Enigma */
        #tela-enigma { max-width: 400px; text-align: center; }
        .riddle-text { font-family: 'Lora', serif; font-size: 1.2rem; color: #5E2C85; margin-bottom: 1.5rem; font-style: italic; }
        #erro-enigma { color: red; font-size: 0.85rem; margin-top: 10px; display: none; font-weight: bold; }

        /* Abas */
        .tabs { display: flex; border-bottom: 2px solid #F4EAFB; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; color: #666; cursor: pointer; transition: 0.3s; min-width: 120px; }
        .tab-btn.active { color: #5E2C85; border-bottom: 3px solid #5E2C85; }
        .tab-btn:hover { background-color: #F4EAFB; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Formulário */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Poppins', sans-serif; box-sizing: border-box; }
        .help-text { font-size: 0.75rem; color: #666; display: block; margin-top: 3px; }

        button.primary { width: 100%; padding: 12px; background-color: #5E2C85; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button.primary:hover { background-color: #2B0D46; }
        button.secondary { background-color: #9B66C5; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-bottom: 15px; }
        button.secondary:hover { background-color: #5E2C85; }
        
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; color: green; display: none; }

        /* Listas e Botões de Ação */
        .admin-list { list-style: none; padding: 0; margin: 0; }
        .admin-list li { background: #F4EAFB; padding: 10px 15px; border-radius: 5px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid #5E2C85; }
        .badge { font-size: 0.8rem; background: #5E2C85; color: white; padding: 3px 8px; border-radius: 12px; margin-left: 5px; }
        
        .action-btns { display: flex; gap: 10px; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: 0.2s; padding: 0; }
        .btn-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="admin-container" id="tela-enigma">
        <h2>🔒 Guardião do Bosque</h2>
        <p class="riddle-text">"O que o seu amor, mais gosta em você?"</p>
        <div class="form-group">
            <input type="password" id="input-enigma" placeholder="Digite a resposta secreta...">
        </div>
        <button id="btn-desvendar" class="primary">Desvendar</button>
        <p id="erro-enigma">Resposta incorreta. Os espíritos da floresta negaram sua entrada!</p>
    </div>

    <div class="admin-container" id="painel-principal" style="display: none;">
        <h2>🛠️ Painel de Controle</h2>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('editar')">📝 Editar Site</button>
            <button class="tab-btn" onclick="showTab('convidados')">👥 Convidados</button>
            <button class="tab-btn" onclick="showTab('itens')">🧺 O que vão levar</button>
        </div>

        <div id="editar" class="tab-content active">
            <div class="form-group">
                <label>Título Principal:</label>
                <input type="text" id="admin-titulo" placeholder="Ex: Meus 20 Anos!">
            </div>
            <div class="form-group">
                <label>Subtítulo:</label>
                <input type="text" id="admin-subtitulo" placeholder="Ex: Um piquenique especial entre as florestas...">
            </div>
            <div class="form-group">
                <label>Texto de Introdução (O DNA da Festa):</label>
                <textarea id="admin-texto-dna" rows="3" placeholder="Texto chamando a galera..."></textarea>
            </div>
            <div class="form-group">
                <label>Frase (Citação):</label>
                <input type="text" id="admin-citacao" placeholder="Ex: Sina de cigarra / Djavanear o que há de bom...">
            </div>
            <div class="form-group">
                <label>Autor da Frase:</label>
                <input type="text" id="admin-autor" placeholder="Ex: - Sina, Djavan">
            </div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #ccc;">
            <div class="form-group">
                <label>Data da Festa:</label>
                <input type="text" id="admin-data" placeholder="Ex: 10 de maio de 2026">
            </div>
            <div class="form-group">
                <label>Horário:</label>
                <input type="text" id="admin-hora" placeholder="Ex: 08:00h AM">
            </div>
            <div class="form-group">
                <label>Nome do Local:</label>
                <input type="text" id="admin-local" placeholder="Ex: Campo São Bento">
            </div>
            <div class="form-group">
                <label>Link do Google Maps (src):</label>
                <input type="text" id="admin-mapa" placeholder="http://googleusercontent.com/maps...">
                <span class="help-text">Apenas a URL que fica dentro do src=" " ao incorporar o mapa.</span>
            </div>

            <button id="btn-salvar" class="primary">Salvar Todas as Alterações</button>
            <p id="status-msg">Alterações salvas com sucesso!</p>
        </div>

        <div id="convidados" class="tab-content">
            <button id="btn-copy-guests" class="secondary">📋 Copiar Lista de Convidados</button>
            <ul id="lista-convidados-admin" class="admin-list"></ul>
        </div>

        <div id="itens" class="tab-content">
            <button id="btn-copy-items" class="secondary">📋 Copiar Lista de Alimentos/Itens</button>
            <ul id="lista-itens-admin" class="admin-list"></ul>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, orderBy, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADD1-3nW7YDKrgX2gDxI-IZliSQ0nKDhI",
            authDomain: "aniversario20y.firebaseapp.com",
            projectId: "aniversario20y",
            storageBucket: "aniversario20y.firebasestorage.app",
            messagingSenderId: "657674628493",
            appId: "1:657674628493:web:2a3cb489d2fd933543e1c4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const configRef = doc(db, "configuracoes", "geral");

        // ==========================================
        // LÓGICA DO ENIGMA
        // ==========================================
        const btnDesvendar = document.getElementById('btn-desvendar');
        const inputEnigma = document.getElementById('input-enigma');
        const erroEnigma = document.getElementById('erro-enigma');
        const telaEnigma = document.getElementById('tela-enigma');
        const painelPrincipal = document.getElementById('painel-principal');

        function checarEnigma() {
            // Pega a resposta, tira os espaços em branco e transforma em minúscula
            const resposta = inputEnigma.value.trim().toLowerCase();
            
            if (resposta === "pepeto" || resposta === "pepetos" || resposta === "olhinhos") {
                telaEnigma.style.display = "none";
                painelPrincipal.style.display = "block";
            } else {
                erroEnigma.style.display = "block";
            }
        }

        btnDesvendar.addEventListener('click', checarEnigma);
        
        // Permite apertar "Enter" para responder
        inputEnigma.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checarEnigma();
            }
        });

        // ==========================================
        // RESTANTE DO CÓDIGO DO PAINEL ADMIN
        // ==========================================

        window.showTab = function(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        const inputs = {
            titulo: document.getElementById('admin-titulo'),
            subtitulo: document.getElementById('admin-subtitulo'),
            texto_dna: document.getElementById('admin-texto-dna'),
            citacao: document.getElementById('admin-citacao'),
            autor: document.getElementById('admin-autor'),
            data: document.getElementById('admin-data'),
            hora: document.getElementById('admin-hora'),
            local: document.getElementById('admin-local'),
            mapa_url: document.getElementById('admin-mapa')
        };
        const btnSalvar = document.getElementById('btn-salvar');
        const statusMsg = document.getElementById('status-msg');

        let arrayConvidados = [];
        let arrayItens = [];

        async function carregarDadosAtuais() {
            const docSnap = await getDoc(configRef);
            if (docSnap.exists()) {
                const dados = docSnap.data();
                for (let key in inputs) { if(dados[key]) inputs[key].value = dados[key]; }
            }
        }
        carregarDadosAtuais();

        btnSalvar.addEventListener('click', async () => {
            btnSalvar.innerText = "Salvando...";
            const novosDados = {};
            for (let key in inputs) { novosDados[key] = inputs[key].value; }
            try {
                await setDoc(configRef, novosDados, { merge: true });
                btnSalvar.innerText = "Salvar Todas as Alterações";
                statusMsg.style.display = "block";
                setTimeout(() => statusMsg.style.display = "none", 3000);
            } catch (error) { alert("Erro: " + error.message); btnSalvar.innerText = "Salvar Todas as Alterações"; }
        });

        window.deletarConvidado = async (id) => {
            if(confirm("Tem certeza que deseja remover este convidado da lista?")) {
                try { await deleteDoc(doc(db, "convidados", id)); } catch (error) { alert("Erro ao deletar: " + error.message); }
            }
        };

        window.editarItem = async (id, itemAtual) => {
            const novoItem = prompt("Editar o nome do item:", itemAtual);
            if(novoItem !== null && novoItem.trim() !== "" && novoItem !== itemAtual) {
                try { await updateDoc(doc(db, "itens_piquenique", id), { item: novoItem.trim() }); } catch (error) { alert("Erro ao editar: " + error.message); }
            }
        };

        window.deletarItem = async (id) => {
            if(confirm("Tem certeza que deseja remover este item da mesa do piquenique?")) {
                try { await deleteDoc(doc(db, "itens_piquenique", id)); } catch (error) { alert("Erro ao deletar: " + error.message); }
            }
        };

        onSnapshot(collection(db, "convidados"), (snapshot) => {
            const listaEl = document.getElementById('lista-convidados-admin');
            listaEl.innerHTML = '';
            arrayConvidados = [];
            snapshot.forEach((documento) => {
                const data = documento.data();
                const id = documento.id; 
                arrayConvidados.push(data.nome);
                listaEl.innerHTML += `<li><strong>${data.nome}</strong><div class="action-btns"><button class="btn-icon" onclick="deletarConvidado('${id}')" title="Excluir Convidado">🗑️</button></div></li>`;
            });
            document.getElementById('btn-copy-guests').innerText = `📋 Copiar Lista (${arrayConvidados.length} Confirmados)`;
        });

        onSnapshot(query(collection(db, "itens_piquenique"), orderBy("timestamp", "desc")), (snapshot) => {
            const listaEl = document.getElementById('lista-itens-admin');
            listaEl.innerHTML = '';
            arrayItens = [];
            snapshot.forEach((documento) => {
                const data = documento.data();
                const id = documento.id; 
                arrayItens.push(`${data.item} (levado por ${data.nome})`);
                const itemSeguro = data.item.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                listaEl.innerHTML += `<li><span>${data.item} <span class="badge">${data.nome}</span></span><div class="action-btns"><button class="btn-icon" onclick="editarItem('${id}', '${itemSeguro}')" title="Editar Item">✏️</button><button class="btn-icon" onclick="deletarItem('${id}')" title="Excluir Item">🗑️</button></div></li>`;
            });
        });

        document.getElementById('btn-copy-guests').addEventListener('click', () => {
            if(arrayConvidados.length === 0) { alert("Nenhum convidado ainda!"); return; }
            const texto = "✅ *LISTA DE CONVIDADOS:*\n" + arrayConvidados.map(c => `- ${c}`).join('\n');
            navigator.clipboard.writeText(texto).then(() => alert("Lista de Convidados Copiada!"));
        });

        document.getElementById('btn-copy-items').addEventListener('click', () => {
            if(arrayItens.length === 0) { alert("Nenhum item ainda!"); return; }
            const texto = "🧺 *O QUE VAMOS TER NO PIQUENIQUE:*\n" + arrayItens.map(i => `- ${i}`).join('\n');
            navigator.clipboard.writeText(texto).then(() => alert("Lista de Itens Copiada!"));
        });
    </script>
</body>
</html>
